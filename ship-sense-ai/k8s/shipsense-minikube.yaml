apiVersion: v1
kind: Namespace
metadata:
  name: shipsense
---
apiVersion: v1
kind: Secret
metadata:
  name: shipsense-secrets
  namespace: shipsense
type: Opaque
stringData:
  SHIPSENSE_SECRET: replace-this-secret-before-demo
  OPENAI_API_KEY: paste-openai-key-in-minikube-secret
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: shipsense-config
  namespace: shipsense
data:
  OPENAI_MODEL: gpt-5-mini
  SHIPSENSE_MFA_ENABLED: "true"
  SHIPSENSE_MFA_DEMO_CODE: "true"
  SHIPSENSE_GOOGLE_DEMO: "true"
  SHIPSENSE_WORKERS: "2"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipsense-api
  namespace: shipsense
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shipsense-api
  template:
    metadata:
      labels:
        app: shipsense-api
    spec:
      containers:
        - name: shipsense-api
          image: shipsense-ai:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: shipsense-config
            - secretRef:
                name: shipsense-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: shipsense-api
  namespace: shipsense
spec:
  type: NodePort
  selector:
    app: shipsense-api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30080
